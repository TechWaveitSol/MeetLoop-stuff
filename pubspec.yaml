name: meetloop
description: "A premium social connection and interactive hub platform for MeetLoop."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Routing & Navigation
  go_router: ^14.0.1

  # Animation & Motion (Per guidelines)
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  rive: ^0.13.0
  flutter_staggered_animations: ^1.0.0

  # Iconography
  hugeicons: ^1.1.7
  phosphor_flutter: ^2.1.0
  lucide_icons_flutter: ^1.0.0

  # Images & UI Utilities
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  google_fonts: ^6.1.0

  # Native Hardware & Map Utilities
  google_maps_flutter: ^2.5.3
  image_picker: ^1.0.7
  camera: ^0.10.5+9
  permission_handler: ^11.3.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Networking & Helpers
  dio: ^5.4.0
  uuid: ^4.3.3
  intl: ^0.19.0
  connectivity_plus: ^5.0.2

  # Local Persistence
  isar: ^3.1.0+1
  isar_generator: ^3.1.0+1
  path_provider: ^2.1.2

  # Cupertino Design Assets
  cupertino_icons: ^1.0.6

  firebase_core: ^2.15.0
  firebase_auth: ^4.10.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.2
  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # Asset assets registry for custom animations and images
  assets:
    - assets/images/
    - assets/lottie/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/app_icon.png"
